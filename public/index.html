<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>إنشاء فاتورة | مؤسسة الهاجري</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
<style>
body {
  font-family: "Tajawal", sans-serif;
  background: linear-gradient(135deg, #e9f2ff, #f9fbff);
  padding: 40px;
  text-align: center;
}
.container {
  background: white;
  padding: 30px 40px;
  border-radius: 20px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.15);
  width: 480px;
  margin: auto;
  border-top: 6px solid #007BFF;
}
h1 {
  color: #007BFF;
  font-size: 24px;
}
label {
  display: block;
  text-align: right;
  font-weight: bold;
  margin-top: 10px;
}
input, select {
  width: 100%;
  padding: 8px;
  border: 1px solid #ccc;
  border-radius: 8px;
  margin-top: 5px;
  font-family: inherit;
}
button {
  background: linear-gradient(135deg, #007BFF, #0056b3);
  color: white;
  border: none;
  padding: 12px 25px;
  border-radius: 8px;
  margin-top: 20px;
  cursor: pointer;
  font-size: 16px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.2);
}
button:hover {
  transform: scale(1.05);
  transition: 0.3s;
}
.car-entry {
  border: 1px solid #ddd;
  border-radius: 10px;
  padding: 10px;
  margin-top: 15px;
  background: #f8faff;
}
</style>
</head>
<body>

<div class="container">
  <h1>📋 إدخال بيانات الفاتورة</h1>

  <label>اسم المنفذ:</label>
  <select id="port">
    <option>البطحاء</option>
    <option>الخفجي</option>
    <option>الربع الخالي</option>
    <option>الحديثة</option>
    <option>سلوى</option>
     <option>جسر الملك فهد</option>
  </select>

  <label>رقم البيان:</label>
  <input type="text" id="declaration">

  <label>التاريخ:</label>
  <input type="date" id="date">

  <div id="carsContainer">
    <div class="car-entry">
      <label>عدد السيارات:</label>
      <input type="number" class="cars">

      <label>رقم اللوحة:</label>
      <input type="text" class="plate">

      <label>اسم السائق:</label>
      <input type="text" class="driver">

      <label>نوع الرخصة:</label>
      <select class="licenseType">
        <option>تخليص</option>
        <option>فسح</option>
         <option>سدادات</option>
         <option>التأمين</option>
          <option>أجور عمال</option>
        <option>رسوم الزراعة</option>
      </select>

      <label>المبلغ بالريال:</label>
      <input type="number" class="amount">
    </div>
  </div>

  <button onclick="addCar()">➕ إضافة صف جديد</button>
  <button onclick="generateInvoice()">إنشاء الفاتورة</button>
</div>

<script>
function addCar() {
  const container = document.getElementById("carsContainer");
  const clone = container.children[0].cloneNode(true);
  clone.querySelectorAll("input").forEach(i => i.value = "");
  container.appendChild(clone);
}

async function generateInvoice() {

  const port = document.getElementById("port").value;
  const declaration = document.getElementById("declaration").value;
  const date = document.getElementById("date").value;

  const carsData = [];

  document.querySelectorAll(".car-entry").forEach(entry => {
    carsData.push({
      cars: entry.querySelector(".cars").value,
      plate: entry.querySelector(".plate").value,
      driver: entry.querySelector(".driver").value,
      licenseType: entry.querySelector(".licenseType").value,
      amount: entry.querySelector(".amount").value
    });
  });

  let total = 0;
  carsData.forEach(item => {
    total += Number(item.amount || 0);
  });

  try {

    const response = await fetch("/api/invoices", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        port,
        declaration,
        date,
        total
      })
    });

    const result = await response.json();

    console.log(result);

    localStorage.setItem(
      "invoiceNumber",
      result.invoiceId
    );

    localStorage.setItem(
      "invoiceData",
      JSON.stringify({
        port,
        declaration,
        date,
        carsData
      })
    );

    window.location.href = "invoice.html";

  } catch (err) {
    console.error(err);
    alert("خطأ في حفظ الفاتورة");
  }
}
</script>

</body>

</html>
